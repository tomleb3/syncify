name: Syncify

on:
  # Run on a schedule - adjust the cron expression to your liking.
  # Default: every day at midnight UTC. Use https://crontab.guru to build expressions.
  schedule:
    - cron: '0 0 * * *'

  # Allow triggering a run manually from the Actions tab.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run Syncify
        env:
          # Required - set in: Settings -> Secrets and variables -> Actions -> Secrets
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

          # Optional config - set in: Settings -> Secrets and variables -> Actions -> Variables
          SPOTIFY_SOURCE_PLAYLIST_IDS: ${{ vars.SPOTIFY_SOURCE_PLAYLIST_IDS }}
          SPOTIFY_TARGET_PLAYLIST_ID: ${{ vars.SPOTIFY_TARGET_PLAYLIST_ID }}
          SPOTIFY_INCLUDE_EXTERNAL: ${{ vars.SPOTIFY_INCLUDE_EXTERNAL }}

          # Optional - enables Telegram notifications
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
        run: uv run python syncify.py
