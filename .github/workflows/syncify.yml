name: Syncify

on:
  # The public upstream stays manual-only so it does not publish anyone's sync history.
  # Uncomment this block in your own runtime repo if you want automated runs.
  # schedule:
  #   - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run Syncify
        env:
          # Required - set in: Settings -> Secrets and variables -> Actions -> Secrets
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

          # Optional config - set in: Settings -> Secrets and variables -> Actions -> Variables
          SPOTIFY_SOURCE_PLAYLIST_IDS: ${{ vars.SPOTIFY_SOURCE_PLAYLIST_IDS }}
          SPOTIFY_TARGET_PLAYLIST_ID: ${{ vars.SPOTIFY_TARGET_PLAYLIST_ID }}
          SPOTIFY_INCLUDE_EXTERNAL: ${{ vars.SPOTIFY_INCLUDE_EXTERNAL }}
          SPOTIFY_REMOVE_MISSING: ${{ vars.SPOTIFY_REMOVE_MISSING }}
        run: uv run python syncify.py
