name: Syncify

on:
  # Run on a schedule — adjust the cron expression to your liking.
  # Default: every day at midnight UTC. Use https://crontab.guru to build expressions.
  schedule:
    - cron: '0 0 * * *'

  # Allow triggering a run manually from the Actions tab.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run Syncify
        env:
          # Set these two in: Settings → Secrets and variables → Actions → Secrets
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Optional: enables Telegram success/failure notifications.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: uv run python syncify.py
